name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. lucent-code-v0.2.0)'
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag || 'main' }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install root dependencies
        run: npm install

      - name: Install webview dependencies
        working-directory: webview
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Package
        run: npx vsce package

      - name: Publish to Marketplace
        run: npx vsce publish --pat ${{ secrets.VSCE_PAT }}

      - name: Upload VSIX to GitHub Release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} *.vsix
