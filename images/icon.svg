<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <filter id="core-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="#0d0d1a"/>

  <!-- Left { bracket — cubic bezier, rounded notch -->
  <path
    d="M 42,18 C 26,18 24,28 24,36 L 24,52 C 24,60 14,64 14,64 C 14,64 24,68 24,76 L 24,92 C 24,100 26,110 42,110"
    fill="none" stroke="#ffffff" stroke-width="2"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>

  <!-- Right } bracket — cubic bezier, rounded notch -->
  <path
    d="M 86,18 C 102,18 104,28 104,36 L 104,52 C 104,60 114,64 114,64 C 114,64 104,68 104,76 L 104,92 C 104,100 102,110 86,110"
    fill="none" stroke="#ffffff" stroke-width="2"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>

  <!-- All connection traces -->
  <g stroke="#ffffff" stroke-width="1" fill="none" opacity="0.18">
    <!-- Center cluster -->
    <line x1="52" y1="36" x2="57" y2="52"/>
    <line x1="76" y1="36" x2="71" y2="52"/>
    <line x1="57" y1="52" x2="71" y2="52"/>
    <line x1="57" y1="52" x2="71" y2="76"/>
    <line x1="57" y1="76" x2="71" y2="76"/>
    <line x1="57" y1="76" x2="52" y2="92"/>
    <line x1="71" y1="76" x2="76" y2="92"/>
    <!-- Left outside -->
    <line x1="10" y1="40" x2="10" y2="64"/>
    <line x1="10" y1="64" x2="10" y2="88"/>
    <line x1="10" y1="40" x2="42" y2="18"/>
    <line x1="10" y1="88" x2="42" y2="110"/>
    <!-- Right outside -->
    <line x1="118" y1="40" x2="118" y2="64"/>
    <line x1="118" y1="64" x2="118" y2="88"/>
    <line x1="118" y1="40" x2="86" y2="18"/>
    <line x1="118" y1="88" x2="86" y2="110"/>
    <!-- Bracket tips to center -->
    <line x1="42" y1="18" x2="52" y2="36"/>
    <line x1="42" y1="110" x2="52" y2="92"/>
    <line x1="86" y1="18" x2="76" y2="36"/>
    <line x1="86" y1="110" x2="76" y2="92"/>
  </g>

  <!-- Bracket arm tip nodes (purple) -->
  <g fill="#a78bfa">
    <circle cx="42" cy="18"  r="4.5"/>
    <circle cx="42" cy="110" r="4.5"/>
    <circle cx="86" cy="18"  r="4.5"/>
    <circle cx="86" cy="110" r="4.5"/>
  </g>

  <!-- Left outside nodes (cyan) -->
  <g fill="#38bdf8">
    <circle cx="10" cy="40" r="4"/>
    <circle cx="10" cy="64" r="4.5"/>
    <circle cx="10" cy="88" r="4"/>
  </g>

  <!-- Right outside nodes (cyan) -->
  <g fill="#38bdf8">
    <circle cx="118" cy="40" r="4"/>
    <circle cx="118" cy="64" r="4.5"/>
    <circle cx="118" cy="88" r="4"/>
  </g>

  <!-- Center cluster — cyan outer -->
  <g fill="#38bdf8">
    <circle cx="52" cy="36" r="4.5"/>
    <circle cx="76" cy="36" r="4.5"/>
    <circle cx="52" cy="92" r="4.5"/>
    <circle cx="76" cy="92" r="4.5"/>
  </g>

  <!-- Center cluster — purple inner -->
  <g fill="#a78bfa">
    <circle cx="57" cy="76" r="5.5"/>
    <circle cx="71" cy="76" r="5.5"/>
  </g>

  <!-- Center — white glowing nodes -->
  <circle cx="57" cy="52" r="7" fill="#ffffff" filter="url(#core-glow)"/>
  <circle cx="71" cy="52" r="7" fill="#ffffff" filter="url(#core-glow)"/>
</svg>
